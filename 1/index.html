<!doctype html>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-left">
          <div class="app-grid" aria-hidden="true">
            <span></span><span></span><span></span>

          <div class="brand-group">
            <span class="brand-vention">vention</span>
            <span class="brand-sharepoint">SharePoint</span>
          </div>
        </div>
        <div class="topbar-search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 4a6 6 0 1 0 3.874 10.582l4.272 4.272 1.414-1.414-4.272-4.272A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"></path>
          </svg>
          <span>Search this site</span>
        </div>
        <div class="topbar-right">
          <button class="icon-button" aria-label="Settings">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.96 7.96 0 0 0 .06-.94 7.96 7.96 0 0 0-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.43 7.43 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.13.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.05.63-.05.94s.01.63.05.94L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.58-.23 1.13-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"/></svg>
          </button>
          <button class="icon-button" aria-label="Help">
            <svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm0-14a4 4 0 0 0-4 4h2a2 2 0 1 1 2 2 1 1 0 0 0-1 1v2h2v-1.13A3.994 3.994 0 0 0 12 6z"/></svg>
          </button>
          <div class="profile-pill" aria-label="Profile">MS</div>
        </div>
      </header>

      <div class="site-header">
        <div class="site-header-left">
          <button class="icon-button menu-button" aria-label="Navigation menu">
            <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
          </button>
          <div class="site-logo">E</div>
          <div class="site-name">EDU</div>
        </div>
        <button class="icon-button more-button" aria-label="More actions">
          <svg viewBox="0 0 24 24"><path d="M6 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm6 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm6 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
        </button>
      </div>

      <main class="content-wrap">
        <nav class="breadcrumbs" aria-label="Breadcrumb">
          <a href="#">Home</a>
          <span>/</span>
          <a href="#">EDU</a>
          <span>/</span>
          <span>Company Leader Board 2025</span>
        </nav>

        <h1 class="page-title">Company Leader Board 2025</h1>

        <section class="leaderboard-card">
          <div class="section-copy">
            <h2>Leaderboard</h2>
            <p>Top performers based on contributions and activity</p>
          </div>

          <div class="filters-card">
            <div class="filters-row">
              <label class="select-shell">
                <span class="sr-only">Filter by year</span>
                <select id="yearFilter"></select>
              </label>
              <label class="select-shell">
                <span class="sr-only">Filter by quarter</span>
                <select id="quarterFilter"></select>
              </label>
              <label class="select-shell">
                <span class="sr-only">Filter by category</span>
                <select id="categoryFilter"></select>
              </label>
            </div>
            <label class="search-shell">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 4a6 6 0 1 0 3.874 10.582l4.272 4.272 1.414-1.414-4.272-4.272A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"></path>
              </svg>
              <input id="searchInput" type="search" placeholder="Search employee..." />
            </label>
          </div>

          <section id="podium" class="podium" aria-label="Top 3 leaderboard"></section>

          <section class="ranking-list-section">
            <div id="rankingList" class="ranking-list"></div>
            <div id="emptyState" class="empty-state" hidden>No matching employees found.</div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
  </html>
