<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Leader Board 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="content-wrap">
        <h1 class="page-title">Company Leader Board 2025</h1>

        <section class="leaderboard-card">
          <div class="filters-card">
            <div class="filters-row">
              <label class="select-shell">
                <span class="sr-only">Filter by year</span>
                <select id="yearFilter"></select>
              </label>
              <label class="select-shell">
                <span class="sr-only">Filter by quarter</span>
                <select id="quarterFilter"></select>
              </label>
              <label class="select-shell">
                <span class="sr-only">Filter by category</span>
                <select id="categoryFilter"></select>
              </label>
            </div>
            <label class="search-shell">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 4a6 6 0 1 0 3.874 10.582l4.272 4.272 1.414-1.414-4.272-4.272A6 6 0 0 0 10 4zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"></path>
              </svg>
              <input id="searchInput" type="search" placeholder="Search employee..." />
            </label>
          </div>

          <section id="podium" class="podium" aria-label="Top 3 leaderboard"></section>

          <section class="ranking-list-section">
            <div id="rankingList" class="ranking-list"></div>
            <div id="emptyState" class="empty-state" hidden>No matching employees found.</div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
  </html>
